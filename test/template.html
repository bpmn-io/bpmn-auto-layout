<html lang="en">
  <head>
    <title>bpmn-auto-layout - Visual Test</title>
    <style>
      :root {
        --issue-stroke: #c2410c;
        --issue-background: #fff7ed;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: monospace;
        font-weight: bold;
        font-size: 12px;
      }

      .parent {
        margin-top: 20px;
      }

      .parent:first-of-type {
        margin-top: 10px;
      }

      .title {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px 8px;
        margin-bottom: 10px;
        padding: 8px 10px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background: #fafafa;
      }

      .fixture-status {
        flex: none;
      }

      .fixture-name {
        min-width: 0;
      }

      .layout-timing {
        display: inline-flex;
        align-items: center;
        flex: none;
        gap: 4px;
        margin-left: auto;
        padding: 4px 6px;
        border: 1px solid #e5e5e5;
        border-radius: 999px;
        background: #fff;
        color: #555;
        font-size: 12px;
        font-weight: normal;
      }

      .layout-timing svg {
        width: 14px;
        height: 14px;
      }

      .layout-timing-part {
        display: inline-flex;
        align-items: center;
        gap: 3px;
      }

      .layout-timing-slow {
        border-color: #fed7aa;
        background: #fff7ed;
        color: #9a3412;
      }

      .metrics-panel {
        flex-basis: 100%;
        border: 1px solid #e5e5e5;
        border-radius: 6px;
        background: #fff;
        color: #444;
        font-weight: normal;
      }

      .warnings-panel {
        flex-basis: 100%;
        padding: 8px;
        border: 1px solid #fed7aa;
        border-radius: 6px;
        background: #fff7ed;
        color: #9a3412;
        font-weight: normal;
      }

      .warnings-title {
        display: flex;
        align-items: center;
        gap: 4px;
        font-weight: bold;
      }

      .warnings-title svg {
        width: 14px;
        height: 14px;
      }

      .warnings-list {
        margin: 6px 0 0;
        padding-left: 18px;
      }

      .warning-code {
        font-weight: bold;
      }

      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 6px;
        padding: 8px;
      }

      .metric {
        min-width: 0;
        padding: 6px 8px;
        border: 1px solid #e5e5e5;
        border-radius: 6px;
        background: #fafafa;
      }

      button.metric {
        width: 100%;
        color: inherit;
        cursor: pointer;
        font: inherit;
        text-align: left;
      }

      button.metric:disabled {
        cursor: not-allowed;
      }

      button.metric.metric-filter-active {
        border-color: var(--issue-stroke);
      }

      .metric.metric-good {
        border-color: #bbf7d0;
        background: #f0fdf4;
        color: #166534;
      }

      .metric.metric-warning {
        border-color: #fed7aa;
        background: var(--issue-background);
        color: var(--issue-stroke);
      }

      .metric.metric-defect {
        border-color: #fecaca;
        background: #fef2f2;
        color: #dc2626;
      }

      .metrics-error {
        margin: 0;
        padding: 0 8px 8px;
        color: #dc2626;
      }

      .metric-name,
      .metric-delta {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .metric-name {
        color: #555;
        font-size: 11px;
      }

      .metric-value {
        display: block;
        margin: 2px 0;
        color: #171717;
        font-size: 14px;
        font-weight: bold;
      }

      .metric-delta {
        color: #666;
        font-size: 11px;
      }

      .metric-filter-badges {
        display: contents;
      }

      .copy-path-button {
        box-sizing: border-box;
        flex: none;
        height: 24px;
        padding: 0;
      }

      .copy-path-button svg {
        width: 14px;
        height: 14px;
        margin-right: 0;
      }

      .copy-path-button.copied {
        border-color: #bbf7d0 !important;
        background: #f0fdf4 !important;
        color: #166534 !important;
      }

      .description {
        flex-basis: 100%;
        color: #555;
        font-weight: normal;
      }

      .container-parent {
        display: flex;
        flex-direction: row;
        flex-basis: auto;
      }

      .container {
        position: relative;
        flex-grow: 1;
        height: 400px;
        border: solid 1px #CCC;
        border-radius: 8px;
        overflow: hidden;
      }

      .container + .container {
        margin-left: 10px;
      }

      .container.after {
        z-index: 0;
      }

      .sub-container {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }

      .maximize-button {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 100;
      }

      body:not(.no-overlay) .snapshot-mismatch .output .djs-shape {
        opacity: 75%;
      }

      .output {
        z-index: 1;
      }

      .sub-container.snapshot .bjs-powered-by {
        display: none;
      }

      .sub-container.message {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .sub-container.error {
        background-color: rgba(255, 0, 0, 0.25);
        color: #F00;
      }

      .snapshot {
        display: none;
        pointer-events: none;
        z-index: 0;
      }

      .snapshot-match:not(:has(.error)) .snapshot {
        background: transparent;
      }

      .snapshot-match:not(:has(.error)) .container.after {
        border-color: #86efac;
        background: linear-gradient(135deg, #fff 0%, #f0fdf4 100%);
      }

      .snapshot-mismatch:not(:has(.error)) .snapshot {
        display: block;
        background: transparent;
      }

      .snapshot-mismatch:not(:has(.error)) .container.after {
        border-color: #fca5a5;
        background: linear-gradient(135deg, #fff 0%, #fef2f2 100%);
      }

      #scroll-container {
        height: 100vh;
        overflow-y: auto;
      }

      .inspect-content {
        padding: 0 16px;
      }

      .statistic {
        position: sticky;
        top: 0;
        z-index: 101;
        box-sizing: border-box;
        min-height: 40px;
        padding: 8px 16px;
        border-bottom: 1px solid #e5e5e5;
        background: white;
        font-size: large;
        display: flex;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 8px 10px;
      }

      .statistic-summary {
        display: flex;
        align-items: center;
        flex: 1 1 700px;
        flex-wrap: wrap;
        gap: 10px;
        min-width: 0;
      }

      .statistic-actions {
        display: flex;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 10px;
        margin-left: auto;
      }

      .sort-controls {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .sort-label {
        font-size: 12px;
        font-weight: normal;
      }

      .sort-select {
        box-sizing: border-box;
        height: 32px;
        max-width: 190px;
        padding: 0 8px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background: #fff;
        color: #171717;
        font: inherit;
        font-size: 12px;
        font-weight: normal;
      }

      .sort-select:focus {
        border-color: #2563eb;
        outline: 3px solid #bfdbfe;
      }

      .path-filter-wrapper {
        position: relative;
      }

      .path-filter {
        box-sizing: border-box;
        width: 240px;
        height: 32px;
        padding: 0 46px 0 10px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background: #fff;
        color: #171717;
        font: inherit;
        font-size: 12px;
        font-weight: normal;
      }

      .path-filter:focus {
        border-color: #2563eb;
        outline: 3px solid #bfdbfe;
      }

      .clear-path-filter {
        position: absolute;
        right: 4px !important;
        top: 4px !important;
        height: 24px !important;
        background: transparent !important;
        border-radius: 5px !important;

        &:hover {
          background: #f5f5f5 !important;
        }
      }

      .clear-path-filter svg {
        width: 14px;
        height: 14px;
        margin-right: 0 !important;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 32px;
        padding: 0 12px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background: #fff;
        color: #171717;
        font: inherit;
        font-size: 12px;
        font-weight: bold;
        line-height: 1;
        cursor: pointer;
        user-select: none;
      }

      .button[hidden] {
        display: none;
      }

      .button svg {
        width: 14px;
        height: 14px;
        margin-right: 6px;
      }

      .button.icon-button {
        width: 32px;
        padding: 0;
      }

      .button.icon-button svg {
        margin-right: 0;
      }

      .button:hover {
        background: #f5f5f5;
      }

      .button[aria-pressed="true"] {
        border-color: #e5e5e5;
        background: #f5f5f5;
        color: #171717;
      }

      .overlay-toggle[aria-pressed="true"] {
        border-color: #fecaca;
        background: #fef2f2;
        color: #dc2626;
      }

      .djs-element[class*="metric-highlight-"] .djs-visual > :first-child,
      .djs-connection[class*="metric-highlight-"] .djs-visual > path {
        stroke: var(--issue-stroke) !important;
        stroke-width: 3px !important;
      }

      .metric-highlight-geometry {
        pointer-events: none;
        stroke: var(--issue-stroke);
        stroke-width: 2px;
      }

      .metric-highlight-area {
        fill: var(--issue-background);
        fill-opacity: 0.7;
      }

      .metric-highlight-point {
        fill: var(--issue-background);
      }

      .metric-highlight-crossing {
        fill: none;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        box-sizing: border-box;
        height: 22px;
        padding: 1px 8px 0;
        border: 1px solid transparent;
        border-radius: 999px;
        font-size: 12px;
        font-weight: bold;
        line-height: 1;
        white-space: nowrap;
      }

      .filter-toggle {
        cursor: pointer;
      }

      .filter-toggle[aria-pressed="false"] {
        opacity: 0.45;
      }

      .badge svg {
        width: 14px;
        height: 14px;
        margin-right: 4px;
      }

      .badge-success {
        border-color: #bbf7d0;
        background: #f0fdf4;
        color: #166534;
      }

      .badge-destructive {
        border-color: #fecaca;
        background: #fef2f2;
        color: #dc2626;
      }

      .badge-secondary {
        border-color: #bfdbfe;
        background: #eff6ff;
        color: #1d4ed8;
      }

      .issue-filter-badge:not(:disabled) {
        border-color: var(--issue-stroke);
        background: var(--issue-background);
        color: var(--issue-stroke);
      }

      button.badge:disabled {
        cursor: not-allowed;
        border-color: #e5e5e5;
        background: #f5f5f5;
        color: #737373;
        opacity: 1;
      }

      @media (max-width: 720px) {
        .statistic {
          padding: 8px 10px;
        }

        .statistic-summary,
        .statistic-actions {
          flex-basis: 100%;
        }

        .statistic-actions {
          margin-left: 0;
        }

        .path-filter-wrapper {
          flex: 1 1 200px;
          min-width: 0;
        }

        .path-filter {
          width: 100%;
        }

        .overlay-toggle {
          flex: 1 1 100%;
        }
      }

      body.no-overlay .sub-container.snapshot {
        display: none;
      }

      #maximize-dialog {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: white;
      }

      #maximize-dialog[hidden] {
        display: none;
      }

      #maximize-container {
        position: absolute;
        inset: 0;
      }

      .maximize-viewer {
        position: absolute;
        inset: 0;
      }

      .maximize-snapshot {
        pointer-events: none;
      }

      #maximize-dialog.snapshot-match {
        background: linear-gradient(135deg, #fff 0%, #f0fdf4 100%);
        box-shadow: inset 0 0 0 2px #86efac;
      }

      #maximize-dialog.snapshot-mismatch {
        background: linear-gradient(135deg, #fff 0%, #fef2f2 100%);
        box-shadow: inset 0 0 0 2px #fca5a5;
      }

      #maximize-dialog.snapshot-mismatch .maximize-output .djs-shape {
        opacity: 75%;
      }

      #minimize-button {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 1;
      }

      #maximize-overlay-toggle {
        position: absolute;
        top: 8px;
        right: 48px;
        z-index: 1;
      }

      #maximize-dialog.no-overlay .maximize-snapshot {
        display: none;
      }

      #maximize-dialog.no-overlay {
        background: #fff;
      }

      #maximize-dialog.no-overlay .maximize-output .djs-shape {
        opacity: 100%;
      }

      .djs-container svg:focus {
        outline: none !important;
      }
    </style>

      const metricDefinitions = [

      const sortDefinitionsByKey = new Map(

      function compareFixtureResults(first, second) {
        const definition = sortDefinitionsByKey.get(sortBy.value);
        const firstValue = definition.getValue(first);
        const secondValue = definition.getValue(second);
        const firstMissing = firstValue === null ||
          firstValue === undefined ||
          (typeof firstValue === 'number' && !Number.isFinite(firstValue));
        const secondMissing = secondValue === null ||
          secondValue === undefined ||
          (typeof secondValue === 'number' && !Number.isFinite(secondValue));

        if (firstMissing || secondMissing) {
          if (firstMissing !== secondMissing) {
            return firstMissing ? 1 : -1;
          }

          return first.name.localeCompare(second.name);
        }

        const order = typeof firstValue === 'string'
          ? firstValue.localeCompare(secondValue)
          : firstValue - secondValue;

        return order === 0
          ? first.name.localeCompare(second.name)
          : sortDirection === 'ascending' ? order : -order;
      }

      function updateMetricHighlights() {

      function createMetricHighlighter(viewer, findings) {
        const canvas = viewer.get('canvas');
        const elementRegistry = viewer.get('elementRegistry');
        const layer = canvas.getLayer('metric-highlights');
        const markers = [];

        function mark(elementId, metric) {
          if (!elementId || !elementRegistry.get(elementId)) {
            return;
          }

          const marker = `metric-highlight-${ metric }`;
          canvas.addMarker(elementId, marker);
          markers.push([ elementId, marker ]);
        }

        function appendOverlay(name, attributes, className) {
          const element = document.createElementNS('http://www.w3.org/2000/svg', name);
          element.setAttribute('class', `metric-highlight-geometry ${ className }`);

          Object.entries(attributes).forEach(([ key, value ]) => {
            element.setAttribute(key, value);
          });

          layer.appendChild(element);
        }

        function addArea(bounds) {
          appendOverlay('rect', bounds, 'metric-highlight-area');
        }

        function addPoint(point, className = 'metric-highlight-point') {
          if (!point) {
            return;
          }

          appendOverlay('circle', {
            cx: point.x,
            cy: point.y,
            r: 8
          }, className);
        }

        function clear() {
          markers.splice(0).forEach(([ elementId, marker ]) => {
            canvas.removeMarker(elementId, marker);
          });
          layer.replaceChildren();
        }

        return {
          update() {
            clear();

            for (const metric of activeMetricFilters) {
              for (const finding of findings?.[metric] || []) {
                if (metric === 'crossings') {
                  finding.edgeIds.forEach(id => mark(id, metric));
                  addPoint(finding.point, 'metric-highlight-crossing');
                } else if (metric === 'overlaps') {
                  finding.shapeIds.forEach(id => mark(id, metric));
                  addArea(finding.bounds);
                } else if (metric === 'labelShapeOverlaps') {
                  mark(finding.label.ownerId, metric);
                  mark(finding.shapeId, metric);
                  addArea(finding.label);
                } else if (metric === 'labelEdgeOverlaps') {
                  mark(finding.label.ownerId, metric);
                  mark(finding.edgeId, metric);
                  addArea(finding.label);
                } else if (metric === 'edgeShapeIntersections') {
                  mark(finding.edgeId, metric);
                  mark(finding.shapeId, metric);
                  addArea(finding.bounds);
                } else if (metric === 'wrongWayDockings') {
                  mark(finding.edgeId, metric);
                  mark(finding.shapeId, metric);
                  addPoint(finding.endpoint);
                }
              }
            }
          },
          destroy() {
            clear();
          }
        };
      }

      function metricState(definition, value, delta) {
        if (definition.directional === false) {
          return '';
        }

        if (definition.zeroIsGood) {
          if (value === 0) {
            return 'metric-good';
          }

          return definition.isDefect ? 'metric-defect' : 'metric-warning';
        }

        if (delta === null || delta === undefined || delta === 0) {
          return '';
        }

        const improved = definition.lowerIsBetter ? delta < 0 : delta > 0;

        return improved ? 'metric-good' : 'metric-warning';
      }

      function formatMetricDelta(delta) {
        if (delta === null || delta === undefined) {
          return 'No baseline';
        }

        if (delta === 0) {
          return 'No change';
        }

        return `Baseline ${delta > 0 ? '+' : ''}${delta}`;
      }

      function createMetricsPanel(metrics) {
        const panel = document.createElement('section');
        panel.className = 'metrics-panel';

        if (metrics.error) {
          const error = document.createElement('p');
          error.className = 'metrics-error';
          error.textContent = `Metrics unavailable: ${metrics.error}`;
          panel.appendChild(error);

          return panel;
        }

        const grid = document.createElement('div');
        grid.className = 'metrics-grid';

        for (const definition of metricDefinitions) {
          const value = metrics.current[definition.key];
          const delta = metrics.delta?.[definition.key];
          const metric = document.createElement(definition.filterable ? 'button' : 'div');
          metric.className = `metric ${metricState(definition, value, delta)}`;
          metric.title = definition.directional === false
            ? 'Informational metric'
            : definition.lowerIsBetter
              ? 'Lower is better'
              : 'Higher is better';

          if (definition.filterable) {
            metric.type = 'button';
            metric.dataset.metricFilter = definition.key;
            metric.dataset.metricLabel = definition.label;
            metric.disabled = !hasMetricFilterResults(definition.key);
            metric.setAttribute('aria-pressed', 'false');
            if (!metric.disabled) {
              metric.addEventListener('click', () => toggleMetricFilter(definition.key));
            }
          }

          const name = document.createElement('span');
          name.className = 'metric-name';
          name.textContent = definition.label;

          const metricValue = document.createElement('span');
          metricValue.className = 'metric-value';
          metricValue.textContent = `${value}${definition.unit || ''}`;

          const metricDelta = document.createElement('span');
          metricDelta.className = 'metric-delta';
          metricDelta.textContent = formatMetricDelta(delta);

          metric.appendChild(name);
          metric.appendChild(metricValue);
          metric.appendChild(metricDelta);
          grid.appendChild(metric);
        }

        panel.appendChild(grid);

        return panel;
      }

      function createLayoutTiming(timing) {
        const element = document.createElement('span');
        const ratio = timing.medianP50Ms > 0
          ? timing.p50Ms / timing.medianP50Ms
          : 0;
        const timerIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="15" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></svg>';
        const descendingIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 17h6v-6"/><path d="m22 17-8.5-8.5-5 5L2 7"/></svg>';
        const gaugeIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>';

        element.className = `layout-timing${timing.isSlow ? ' layout-timing-slow' : ''}`;
        element.title = `Informational timing from ${timing.runs} measured layouts after one warm-up; it is not a performance baseline or test gate.`;
        element.innerHTML = `
          <span class="layout-timing-part">${timerIcon}Avg ${timing.averageMs.toFixed(1)} ms</span>
          <span class="layout-timing-part">p50 ${timing.p50Ms.toFixed(1)} ms</span>
          <span class="layout-timing-part">p90 ${timing.p90Ms.toFixed(1)} ms</span>
          <span class="layout-timing-part">${descendingIcon}#${timing.rank} / ${timing.total} slowest</span>
          ${ratio ? `<span class="layout-timing-part">${gaugeIcon}${ratio.toFixed(1)}x median p50</span>` : ''}
        `;

        return element;
      }

      function createWarningsPanel(warnings) {
        const panel = document.createElement('section');
        panel.className = 'warnings-panel';

        const title = document.createElement('div');
        title.className = 'warnings-title';
        title.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>';
        title.append(`Layout warnings (${warnings.length})`);
        panel.appendChild(title);

        const list = document.createElement('ul');
        list.className = 'warnings-list';

        for (const warning of warnings) {
          const item = document.createElement('li');
          const code = document.createElement('span');
          code.className = 'warning-code';
          code.textContent = warning.code;
          item.appendChild(code);
          item.append(` (${warning.elementId}): ${warning.message}`);
          list.appendChild(item);
        }

        panel.appendChild(list);

        return panel;
      }

      async function copyPath(path) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(path);
          return;
        }

        const textarea = document.createElement('textarea');
        textarea.value = path;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        textarea.remove();
      }

      for (const result of sortResults()) {
        const {
          diagram,
          diagramOutput,
          diagramSnapshot,
          diagramSnapshotMatching,
          layoutTiming,
          metrics,
          name,
          warnings
        } = result;
        const parent = document.createElement('div');

        parent.className = 'parent';
        parent.dataset.issueMetrics = metricDefinitions
          .filter(definition => definition.filterable && metrics?.current?.[definition.key] > 0)
          .map(definition => definition.key)
          .join(' ');
        parent.dataset.hasWarnings = String(warnings.length > 0);

        if (diagramSnapshotMatching === true) {
          parent.dataset.status = 'passed';
          parent.classList.add('snapshot-match');
        } else if (diagramSnapshotMatching === false) {
          parent.dataset.status = 'failed';
          parent.classList.add('snapshot-mismatch');
        } else {
          parent.dataset.status = 'new';
        }

        const title = document.createElement('div');
        title.className = 'title';

        const status = document.createElement('span');
        status.className = 'badge fixture-status';

        if (diagramSnapshotMatching === true) {
          status.classList.add('badge-success');
          status.title = 'Passed';
          status.setAttribute('aria-label', 'Passed');
          status.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>Passed';
        } else if (diagramSnapshotMatching === false) {
          status.classList.add('badge-destructive');
          status.title = 'Failed';
          status.setAttribute('aria-label', 'Failed');
          status.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>Failed';
        } else {
          status.classList.add('badge-secondary');
          status.title = 'New';
          status.setAttribute('aria-label', 'New');
          status.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>New';
        }

        const fixtureName = document.createElement('span');
        fixtureName.className = 'fixture-name';
        const fixturePath = 'test/fixtures/' + name;
        parent.dataset.path = fixturePath;
        fixtureName.textContent = fixturePath;

        const copyPathButton = document.createElement('button');
        copyPathButton.className = 'button copy-path-button';
        copyPathButton.type = 'button';
        copyPathButton.title = 'Copy fixture path';
        copyPathButton.setAttribute('aria-label', 'Copy fixture path');
        copyPathButton.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>Copy';
        let copiedTimeout;
        copyPathButton.addEventListener('click', async () => {
          try {
            await copyPath(fixturePath);
            clearTimeout(copiedTimeout);
            copyPathButton.classList.add('copied');
            copyPathButton.title = 'Copied';
            copyPathButton.setAttribute('aria-label', 'Fixture path copied');
            copiedTimeout = setTimeout(() => {
              copyPathButton.classList.remove('copied');
              copyPathButton.title = 'Copy fixture path';
              copyPathButton.setAttribute('aria-label', 'Copy fixture path');
            }, 600);
          } catch (error) {
            console.error('Could not copy fixture path', error);
          }
        });

        title.appendChild(status);
        title.appendChild(fixtureName);
        title.appendChild(copyPathButton);
        if (layoutTiming) {
          title.appendChild(createLayoutTiming(layoutTiming));
        }

        const description = getProcessDocumentation(diagram);

        if (description) {
          const descriptionElement = document.createElement('div');
          descriptionElement.className = 'description';
          descriptionElement.textContent = description;
          title.appendChild(descriptionElement);
        }

        if (metrics) {
          title.appendChild(createMetricsPanel(metrics));
        }

        if (warnings.length) {
          title.appendChild(createWarningsPanel(warnings));
        }

        const containerParent = document.createElement('div');
        containerParent.className = 'container-parent';

        const containerBefore = document.createElement('div');
        containerBefore.className = 'container before';

        const containerAfter = document.createElement('div');
        containerAfter.className = 'container after';

        parent.appendChild(title);
        parent.appendChild(containerParent);
        fixtureParents.set(result, parent);

        containerParent.appendChild(containerBefore);
        containerParent.appendChild(containerAfter);

        inspectContent.appendChild(parent);

        const subContainerDiagram = document.createElement('div');
        subContainerDiagram.className = 'sub-container diagram';

        const subContainerOutput = document.createElement('div');
        subContainerOutput.className = 'sub-container output';

        const subContainerSnapshot = document.createElement('div');
        subContainerSnapshot.className = 'sub-container snapshot';

        containerBefore.appendChild(subContainerDiagram);
        containerAfter.appendChild(subContainerOutput);
        containerAfter.appendChild(subContainerSnapshot);

        const viewerContainers = diagramSnapshot
          ? [ subContainerDiagram, subContainerOutput, subContainerSnapshot ]
          : [ subContainerDiagram, subContainerOutput ];

        viewerContainers.forEach(container => {
          const maximizeButton = document.createElement('button');
          maximizeButton.className = 'maximize-button button icon-button';
          maximizeButton.type = 'button';
          maximizeButton.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h6v6"/><path d="m21 3-7 7"/><path d="m3 21 7-7"/><path d="M9 21H3v-6"/></svg>';
          maximizeButton.title = 'Maximize diagram';
          maximizeButton.setAttribute('aria-label', 'Maximize diagram');

          if (container === subContainerSnapshot) {
            containerAfter.appendChild(maximizeButton);
          } else {
            container.appendChild(maximizeButton);
          }

          const xml = container === subContainerDiagram ? diagram : container === subContainerOutput ? diagramOutput : diagramSnapshot;

          maximizeButton.addEventListener('click', () => {
            if (container === subContainerSnapshot) {
              maximizeComparison(
                diagramOutput,
                diagramSnapshot,
                diagramSnapshotMatching === true,
                metrics?.findings
              );
            } else {
              maximizeDiagram(xml, container === subContainerOutput ? {
                findings: metrics?.findings
              } : {});
            }
          });
        });

        [ containerBefore, containerAfter ].forEach(container => {
          container.addEventListener('wheel', event => {
            if (!event.ctrlKey) {
              event.stopImmediatePropagation();
            }
          }, { capture: true });
        });

        const diagramViewer = new BpmnJS({
          container: subContainerDiagram
        });

        const diagramSnapshotViewer = new BpmnJS({
          container: subContainerSnapshot,
          bpmnRenderer: {
            defaultStrokeColor: 'red'
          }
        });

        const diagramOutputViewer = new BpmnJS({
          container: subContainerOutput
        });

        const errors = Promise.all([
          diagramViewer.importXML(diagram).then(({ warnings }) => {
            if (warnings.length) {
              console.warn(warnings);
            }

            diagramViewer.get('canvas').zoom('fit-viewport');
          }).catch(err => {
            console.error('Viewer render error', err);

            subContainerDiagram.textContent = `Error: ${err.message}`;
            subContainerDiagram.classList.add('message');

            return err;
          }),

          diagramOutputViewer.importXML(diagramOutput).then(({ warnings }) => {
            if (warnings.length) {
              console.warn(warnings);
            }

            diagramOutputViewer.get('canvas').zoom('fit-viewport');

            const highlighter = createMetricHighlighter(diagramOutputViewer, metrics?.findings);
            outputHighlighters.add(highlighter);
            highlighter.update();

            if (diagramSnapshot) {
              diagramSnapshotViewer.get('canvas').viewbox(diagramOutputViewer.get('canvas').viewbox());
            }
          }).catch(err => {
            console.error('Output render error', err);

            subContainerOutput.textContent = `Error: ${err.message}`;
            subContainerOutput.classList.add('message');
          })
        ]);

        if (diagramSnapshot && diagramSnapshotMatching === false) {
          diagramSnapshotViewer.importXML(diagramSnapshot).then(({ warnings }) => {
            if (warnings.length) {
              console.warn(warnings);
            }

            diagramSnapshotViewer.get('canvas').viewbox(diagramOutputViewer.get('canvas').viewbox());
          }).catch(err => {
            console.error('Snapshot render error', err);
          });
        }

        errors.then(([ a, b ]) => {
          if (a && b && a.message !== b.message) {
            subContainerOutput.classList.add('error');
          }
        });

        let isSyncing = false;

        diagramViewer.on('canvas.viewbox.changed', () => {
          if (isSyncing) {
            return;
          }

          isSyncing = true;

          diagramOutputViewer.get('canvas').viewbox(diagramViewer.get('canvas').viewbox());
          
          if (diagramSnapshot) {
            diagramSnapshotViewer.get('canvas').viewbox(diagramViewer.get('canvas').viewbox());
          }

          isSyncing = false;
        });

        diagramOutputViewer.on('canvas.viewbox.changed', () => {
          if (isSyncing) {
            return;
          }

          isSyncing = true;

          diagramViewer.get('canvas').viewbox(diagramOutputViewer.get('canvas').viewbox());

          if (diagramSnapshot) {
            diagramSnapshotViewer.get('canvas').viewbox(diagramOutputViewer.get('canvas').viewbox());
          }

          isSyncing = false;
        });
      }

      updateWarningFilterUI();
      updateMetricFilterUI();
    </script>
  </body>
</html>
